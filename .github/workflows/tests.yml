name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Run example forecast
        run: python3 scripts/forecast.py --input examples/multi-book-match.json --pretty
